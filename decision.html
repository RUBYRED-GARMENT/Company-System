<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUBYRED - Decision</title>
    <link rel="stylesheet" href="new.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="icon" href="pic/logooo.png">
    <style>
    /* التنسيقات العامة للموقع */
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #222;
      min-height: 100vh;
      color: #fff;
    }

    .top-section {
      background-image: url('pic/sewing.jpg');
      background-size: cover;
      background-position: center;
      height: 50vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .header {
      text-align: center;
      width: 100%;
      padding: 0 20px;
      box-sizing: border-box;
    }

    .name h1 {
      color: #fff;
      font-size: 2.5rem;
      margin: 0;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    }

    .name span {
      color: #ff6b6b;
    }

    /* القائمة العادية للشاشات الكبيرة */
    .nav ul {
      list-style: none;
      padding: 0;
      margin: 20px 0 0 0;
      display: flex;
      justify-content: center;
      gap: 30px;
    }

    .nav a {
      color: #fff;
      text-decoration: none;
      font-weight: bold;
      transition: color 0.3s;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    }

    .nav a:hover {
      color: #ff6b6b;
    }

    /* زر القائمة للهواتف (الهامبرجر) */
    .menu-btn {
      display: none;
      background: none;
      border: none;
      color: #fff;
      font-size: 1.8rem;
      cursor: pointer;
      margin-top: 15px;
    }

    /* القائمة الجانبية للموبايل */
    #sidebar {
      position: fixed;
      top: 0;
      right: -280px;
      width: 280px;
      height: 100vh;
      background: rgba(40, 40, 40, 0.95);
      box-shadow: -2px 0 10px rgba(0, 0, 0, 0.5);
      transition: right 0.3s ease;
      z-index: 1050;
      padding-top: 60px;
      box-sizing: border-box;
    }
    
    #sidebar.active {
      right: 0;
    }
    
    #sidebar ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    
    #sidebar ul li a {
      color: #e0e0e0;
      text-decoration: none;
      font-weight: 700;
      font-size: 1.2rem;
      display: block;
      padding: 15px 25px;
      transition: background 0.3s, color 0.3s;
    }
    
    #sidebar ul li a:hover {
      background: #ff6b6b;
      color: #fff;
    }

    /* زر إغلاق السايد بار */
    .close-btn {
      position: absolute;
      top: 15px;
      left: 20px;
      background: none;
      border: none;
      color: #fff;
      font-size: 1.5rem;
      cursor: pointer;
    }

    /* ======================================================= */
    /* التحكم في منطقة عرض المستند وتثبيت اللوجو والهيدر */
    /* ======================================================= */
    .document-container {
      max-width: 1000px;
      margin: 50px auto;
      padding: 0 25px;
      box-sizing: border-box;
    }

    /* هيدر اللوجو الثابت فوق النص */
    .doc-fixed-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .doc-fixed-header .company-logo {
      width: 100px;
      height: 100px;
      object-fit: cover;
      border-radius: 50%; /* جعل اللوجو دائرياً */
      margin-bottom: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    .doc-fixed-header h2 {
      font-size: 2.2rem;
      font-weight: bold;
      color: #ffffff;
      margin: 0;
      letter-spacing: 1px;
    }

    .doc-fixed-header h2 span {
      color: #ff3333; /* لون كلمة RED الأحمر الناصع المخصص للوجو */
    }

    .doc-clean-view {
      direction: rtl; 
      text-align: center;
    }

    /* تطبيق الشروط: خط كبير، أبيض، عريض، وبدون خلفيات بيضاء */
    .doc-clean-view *, 
    .doc-clean-view span, 
    .doc-clean-view p,
    .doc-clean-view li {
      background-color: transparent !important;
      color: #ffffff !important;         
      font-weight: bold !important;       
      font-size: 1.4rem !important;       
      font-family: Arial, sans-serif !important;
      text-align: center !important;      
      line-height: 1.8 !important;
    }

    /* ستايل خاص بالعناوين الداخلية للمستند إن وجدت */
    .doc-clean-view h1, .doc-clean-view h2, .doc-clean-view h3 {
      color: #ff6b6b !important;
      font-size: 2rem !important;
      margin-top: 30px;
      margin-bottom: 20px;
      text-align: center !important;
    }

    /* حظر وإخفاء تذييل جوجل السفلي نهائياً */
    #footer, [id*="footer"], .google-src-footer, [class*="footer"] {
      display: none !important;
      opacity: 0 !important;
      visibility: hidden !important;
      height: 0 !important;
      padding: 0 !important;
    }

    /* الفوتر الخاص بموقعك */
    .my-custom-footer {
      background: #111;
      text-align: center;
      padding: 30px 20px;
      margin-top: 60px;
      display: block !important;
    }
    
    .my-custom-footer p {
      margin: 10px 0;
      font-size: 1rem;
      color: #aaa;
    }
    
    .social {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-top: 15px;
    }
    
    .social a {
      color: #fff;
      font-size: 1.3rem;
      transition: color 0.3s;
    }
    
    .social a:hover {
      color: #ff6b6b;
    }

    /* الشاشات الصغيرة للموبايل */
    @media (max-width: 768px) {
      .top-section {
        height: 40vh;
      }
      .name h1 {
        font-size: 1.8rem;
      }
      .nav {
        display: none;
      }
      .menu-btn {
        display: inline-block;
      }
      .doc-fixed-header .company-logo {
        width: 80px;
        height: 80px;
      }
      .doc-fixed-header h2 {
        font-size: 1.7rem;
      }
      .doc-clean-view *, .doc-clean-view span, .doc-clean-view p {
        font-size: 1.2rem !important; 
      }
    }
    </style>
</head>
<body>

  <section class="top-section">
    <div class="header">
      <div class="name"><h1>RUBY<span>RED</span> DECISION</h1></div>
      
      <button class="menu-btn" id="menu-btn" aria-label="Open navigation">
        <i class="fas fa-bars"></i>
      </button>
      
      <nav class="nav" id="navbar">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="HR.html">HR</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </nav>
    </div>
  </section>

  <div id="sidebar">
    <button class="close-btn" id="close-btn"><i class="fas fa-times"></i></button>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="HR.html">HR</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </div>

  <main class="document-container">
    
    <div class="doc-fixed-header">
      <img src="pic/logooo.png" alt="RubyRed Logo" class="company-logo">
      <h2>RUBY<span>RED</span> GARMENT</h2>
    </div>

    <div id="google-doc-content" class="doc-clean-view">
      <p style="text-align: center; color: #aaa;">Loading content...</p>
    </div>
  </main>

  <footer class="my-custom-footer">
    <p>RUBYRED GARMENT</p>
    <div class="social">
      <a href="https://www.facebook.com/RUBYREDGARMENTSAE/" target="_blank"><i class="fab fa-facebook-f"></i></a>
      <a href="https://www.linkedin.com/company/rubyred-garment-manufacturing-s-a-e/posts/?feedView=all" target="_blank"><i class="fab fa-linkedin-in"></i></a>
      <a href="mailto:hr@rubyredgarment.com"><i class="fas fa-envelope"></i></a>
    </div>
  </footer>

  <script>
    // 1. تشغيل وإغلاق الـ Sidebar للموبايل
    const menuBtn = document.getElementById('menu-btn');
    const closeBtn = document.getElementById('close-btn');
    const sidebar = document.getElementById('sidebar');

    menuBtn.addEventListener('click', function() {
      sidebar.classList.add('active');
    });

    closeBtn.addEventListener('click', function() {
      sidebar.classList.remove('active');
    });

    document.addEventListener('click', function(event) {
      if (!sidebar.contains(event.target) && !menuBtn.contains(event.target)) {
        sidebar.classList.remove('active');
      }
    });

    // 2. جلب وتطهير محتوى جوجل بالكامل وتحويل الروابط النصية لصور (إن وجدت)
    const docUrl = "https://docs.google.com/document/d/e/2PACX-1vQ3b9ukPWFL6-RbMzyLk4sgF-D4Udzvsy5w-OmZDpg769J_w0eOD7ocNpbc6fc1n7ceSaK16jwMgnAr/pub";

    fetch(docUrl)
      .then(response => {
        if (!response.ok) throw new Error('Network response was not ok');
        return response.text();
      })
      .then(html => {
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');
        
        // مسح عناصر الـ footer المضمنة في كود جوجل
        const googleFooters = doc.querySelectorAll('footer, #footer, [id*="footer"], [class*="footer"]');
        googleFooters.forEach(f => f.remove());
        
        // فلترة وحذف الكلمات الافتتاحية المزعجة (تم النشر، إساءة الاستخدام، إلخ)
        const allElements = doc.querySelectorAll('body *');
        allElements.forEach(el => {
          const text = el.textContent;
          if (
            text.includes('Published by') || 
            text.includes('تم النشر بواسطة') || 
            text.includes('Google Docs') || 
            text.includes('مستندات Google') || 
            text.includes('الإبلاغ عن إساءة') || 
            text.includes('Report abuse') ||
            text.includes('مزيد من المعلومات')
          ) {
             el.remove();
          }
        });

        // إزالة ستايلات وسكربتات جوجل الافتراضية المزعجة
        const scripts = doc.querySelectorAll('script, style');
        scripts.forEach(s => s.remove());

        // الحصول على كود المحتوى الصافي والفلترة الذكية لروابط الصور النصية بالـ Regex
        let bodyContent = doc.querySelector('body').innerHTML;
        
        const imageRegex = /(https?:\/\/[^\s<]+?\.(?:png|jpg|jpeg|gif|webp|svg))/gi;
        bodyContent = bodyContent.replace(imageRegex, '<img src="$1" alt="Decision Image" style="max-width:100%; height:auto; border-radius:8px; margin:20px auto; display:block; box-shadow:0 4px 15px rgba(0,0,0,0.4);">');

        // حقن المحتوى النهائي النظيف
        document.getElementById('google-doc-content').innerHTML = bodyContent;
      })
      .catch(error => {
        console.error('Error:', error);
        document.getElementById('google-doc-content').innerHTML = "<p style='color:red; text-align:center;'>Failed to load content.</p>";
      });
  </script>

</body>
</html>
