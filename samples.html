<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUBYRED - Samples</title>
    <link rel="stylesheet" href="new.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="icon" href="pic/logooo.png">
    <style>
    /* التنسيقات الأساسية العامة */
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #222;
      min-height: 100vh;
      padding: 0;
      overflow-x: hidden; /* لمنع ظهور شريط التمرير الأفقي بسبب السايد بار */
    }

    .top-section {
      background-image: url('pic/sewing.jpg');
      background-size: cover;
      background-position: center;
      height: 60vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
      box-sizing: border-box;
    }

    .header {
      text-align: center;
      width: 100%;
      max-width: 1200px;
    }

    .name h1 {
      color: #fff;
      font-size: 2.5rem;
      margin: 0;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    }

    .name span {
      color: #ff6b6b;
    }

    .nav ul {
      list-style: none;
      padding: 0;
      margin: 20px 0 0 0;
      display: flex;
      justify-content: center;
      gap: 30px;
    }

    .nav a {
      color: #fff;
      text-decoration: none;
      font-weight: bold;
      transition: color 0.3s;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    }

    .nav a:hover {
      color: #ff6b6b;
    }

    /* زر القائمة للشاشات الصغيرة */
    .menu-btn {
      display: none;
      background: none;
      border: none;
      color: #fff;
      font-size: 2rem;
      cursor: pointer;
      margin-top: 15px;
      transition: color 0.3s;
    }
    .menu-btn:hover {
      color: #ff6b6b;
    }

    /* القائمة الجانبية الموبايل */
    #sidebar {
      position: fixed;
      top: 0;
      right: -280px;
      width: 280px;
      height: 100vh;
      background: rgba(40, 40, 40, 0.95);
      backdrop-filter: blur(5px);
      box-shadow: -2px 0 10px rgba(0, 0, 0, 0.5);
      transition: right 0.3s ease;
      z-index: 1050;
      padding-top: 60px;
      box-sizing: border-box;
    }
    #sidebar.active {
      right: 0;
    }
    #sidebar ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    #sidebar ul li {
      padding: 1rem 2rem;
    }
    #sidebar ul li a {
      color: #e0e0e0;
      text-decoration: none;
      font-weight: 700;
      font-size: 1.2rem;
      display: block;
      transition: color 0.3s ease;
    }
    #sidebar ul li a:hover {
      color: #ff6b6b;
    }
    
    /* زر إغلاق داخل السايد بار */
    .close-btn {
      position: absolute;
      top: 15px;
      left: 20px;
      background: none;
      border: none;
      color: #fff;
      font-size: 1.5rem;
      cursor: pointer;
    }

    /* منطقة الكروت المتجاوبة */
    .cards-container {
      display: grid;
      /* توزيع تلقائي ذكي يحول عدد الأعمدة بناءً على مساحة الشاشة */
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 25px;
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .card {
      width: 100%;
      height: 180px;
      perspective: 1000px;
      cursor: pointer;
      text-decoration: none;
      position: relative;
      display: block;
    }

    .card-inner {
      background: linear-gradient(135deg, #444, #222);
      width: 100%;
      height: 100%;
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
      transition: transform 0.8s;
      transform-style: preserve-3d;
      will-change: transform;
      border: 1px solid #333;
    }

    .card:hover .card-inner,
    .card:focus .card-inner {
      transform: rotateY(180deg);
    }

    .card-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-size: 1.3rem;
      font-weight: bold;
      user-select: none;
      pointer-events: none;
      z-index: 10;
      text-align: center;
      width: 90%;
      letter-spacing: 1px;
    }

    /* الفوتر وتنسيقاته */
    .footer {
      background: #111;
      padding: 30px 20px;
      text-align: center;
      color: #fff;
      margin-top: 40px;
      border-top: 3px solid #ff6b6b;
    }
    .footer img {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      margin-bottom: 10px;
    }
    .footer p {
      margin: 5px 0 15px 0;
      font-size: 14px;
      letter-spacing: 1px;
    }
    .social {
      display: flex;
      justify-content: center;
      gap: 20px;
    }
    .social a {
      color: #fff;
      font-size: 1.4rem;
      transition: color 0.3s, transform 0.3s;
    }
    .social a:hover {
      color: #ff6b6b;
      transform: translateY(-3px);
    }

    /* شاشات التابلت والأجهزة المتوسطة (Max-width: 992px) */
    @media (max-width: 992px) {
      .name h1 {
        font-size: 2.2rem;
      }
      .cards-container {
        gap: 20px;
        padding: 30px 15px;
      }
    }

    /* شاشات الموبايل (Max-width: 768px) */
    @media (max-width: 768px) {
      .top-section {
        height: 50vh;
      }
      .name h1 {
        font-size: 1.8rem;
      }
      .nav {
        display: none; /* إخفاء القائمة الأفقية العادية */
      }
      .menu-btn {
        display: inline-block; /* إظهار زر الهامبرغر */
      }
      .cards-container {
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 15px;
      }
      .card {
        height: 150px;
      }
      .card-text {
        font-size: 1.1rem;
      }
    }
  </style>
</head>
<body>

  <!-- السكشن العلوي -->
  <section class="top-section">
    <div class="header">
      <div class="logo">
        <img src="pic/logooo.png" alt="RUBYRED Logo" style="width: 60px; height: 60px; border-radius: 50%; margin-bottom: 10px; display: none;">
      </div>
      <div class="name"><h1>RUBY<span>RED</span> SAMPLES</h1></div>
      
      <!-- زر فتح القائمة -->
      <button class="menu-btn" id="menu-btn" aria-label="Open navigation">
        <i class="fas fa-bars"></i>
      </button>
      
      <!-- نافبار الشاشات الكبيرة -->
      <div class="nav" id="navbar">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="HR.html">HR</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </div>
    </div>
  </section>

  <!-- القائمة الجانبية للموبايل -->
  <div id="sidebar">
    <button class="close-btn" id="close-btn" aria-label="Close navigation"><i class="fas fa-times"></i></button>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="HR.html">HR</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </div>
 
  <!-- مساحة فارغة في حال احتجتها مستقبلاً -->
  <div class="free-space" style="background: #222; color: #fff;"></div>

  <!-- حاوية الكروت المتجاوبة -->
  <div class="cards-container">
    <a href="handbook.html" class="card" role="link" tabindex="0" aria-label="hand book">
      <div class="card-inner"></div>
      <div class="card-text">HAND BOOK</div>
    </a>

    <a href="EVALUATION.HTML" class="card" role="link" tabindex="0" aria-label="Cutting Department">
      <div class="card-inner"></div>
      <div class="card-text">EVALUATION FORM</div>
    </a>

    <a href="#" class="card" role="link" tabindex="0" aria-label="QA Department">
      <div class="card-inner"></div>
      <div class="card-text">ORGANIZATION CHART</div>
    </a>

    <a href="grade_up.html" class="card" role="link" tabindex="0" aria-label="Printing Department">
      <div class="card-inner"></div>
      <div class="card-text">GRADE UP SYSTEM</div>
    </a>

    <a href="#" class="card" role="link" tabindex="0" aria-label="Embroidery Department">
      <div class="card-inner"></div>
      <div class="card-text">COMPETENCE</div>
    </a>

    <a href="#" class="card" role="link" tabindex="0" aria-label="Warehouse Department">
      <div class="card-inner"></div>
      <div class="card-text">ACADEMIA</div>
    </a>
  </div>

  <!-- الفوتر الموحد -->
  <div class="footer">
    <img src="pic/logooo.png" alt="Rubyred Logo">
    <p>RUBYRED GARMENT</p>
    <div class="social">
      <a href="https://www.facebook.com/RUBYREDGARMENTSAE/" target="_blank"><i class="fab fa-facebook-f"></i></a>
      <a href="https://www.linkedin.com/company/rubyred-garment-manufacturing-s-a-e/posts/?feedView=all" target="_blank"><i class="fab fa-linkedin-in"></i></a>
      <a href="mailto:hr@rubyredgarment.com"><i class="fas fa-envelope"></i></a>
    </div>
  </div>

  <!-- كود الجافا سكريبت لتشغيل الـ Sidebar في الموبايل -->
  <script>
    const menuBtn = document.getElementById('menu-btn');
    const closeBtn = document.getElementById('close-btn');
    const sidebar = document.getElementById('sidebar');

    // فتح القائمة الجانبية
    menuBtn.addEventListener('click', () => {
      sidebar.classList.add('active');
    });

    // إغلاق القائمة الجانبية عند الضغط على زر X
    closeBtn.addEventListener('click', () => {
      sidebar.classList.remove('active');
    });

    // إغلاق القائمة عند الضغط في أي مكان خارجها
    document.addEventListener('click', (e) => {
      if (!sidebar.contains(e.target) && !menuBtn.contains(e.target)) {
        sidebar.classList.remove('active');
      }
    });
  </script>

</body>
</html>
